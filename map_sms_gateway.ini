; MAP SMS Gateway configuration
; Values moved out of Python source so the script contains no environment-specific
; IP addresses, point codes, GTs, MSISDN examples, or test message presets.

[transport]
sctp_host = 0.0.0.0
sctp_port = 2905
log_file = map_sms_gateway.log
log_level = INFO

[signaling]
local_pc = 649
remote_pc = 2139
local_gt = 817085811990
remote_gt = 817090512001
hlr_gt = 817085811990
msc_gt = 817085811990
vlr_gt = 817085811990
smsc_gt = 817090514560
