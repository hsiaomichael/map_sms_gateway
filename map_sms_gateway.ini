; MAP SMS Gateway configuration
; Values moved out of Python source so the script contains no environment-specific
; IP addresses, point codes, GTs, MSISDN examples, or test message presets.

[transport]
sctp_host = 0.0.0.0
sctp_port = 2905
log_file = map_sms_gateway.log
log_level = INFO

[signaling]
local_pc = 642
remote_pc = 2130
local_gt = 817085811990
remote_gt = 817090512220
hlr_gt = 817085811990
msc_gt = 817085811990
vlr_gt = 817085811990
smsc_gt = 817090512220
fsmsc_gt = 886932000001

[m3ua]
route_context = 34
network_indicator = 3
ssn = 6
called_ssn = 8
calling_ssn = 8

[sccp]
; Outbound SCCP connectionless message type for TCAP/MAP payloads: udt or xudt
message_type = xudt
; Used only when message_type = xudt
hop_counter = 15

[imsi]
imsi_mcc = 440
imsi_mnc = 11

[examples]
example_oa = 1.1.817085811401
example_da = 1.1.817085811402

[housekeeping]
dialogue_ttl = 120
cleanup_interval = 30

[map]
mt_response_mode = success
alert_sc_acn = 0.4.0.0.1.0.23.2

[sri_table]
81707* = 817085811991,440110111111111
8170858* = 817085811991,44011*
886932222222 = 886932000001,466920222222222
886936* = 886936000001,46601*

[menu_presets]
short_gsm7_mo = mo test 123
short_gsm7_mt = mt test 456
short_ucs2 = 簡訊服務 SMS；有時也稱為訊息、簡訊、文字訊息
long_gsm7 = SEG1 This is segment 1 of the GSM/SMPP long message. It continues the structured transmission, ensuring clarity and coherence throughout. Segment 1 proviSEG2 This is segment 2 of the GSM/SMPP long message. It continues the structured transmission, ensuring clarity and coherence throughout. Segment 2 proviSEG3 This is segment 3 of the GSM/SMPP long message. It continues the structured transmission, ensuring clarity and coherence throughout. Segment 3 provi
long_ucs2 = 當一則簡訊（SMS）超過標準長度限制時（例如 GSM 7-bit 編碼的 160 字元或 UCS-2 編碼的 70 字元），GSM 系統會使用（Concatenated SMS） 技術來分割並傳送訊息。每一部分都會附加一段特殊的資料，稱為 （UDH） UDH 是一段佔用空間的控制資訊，通常佔用 6 或 7 個位元組（bytes）。因此每一部分可用的字元數會比單一 SMS 少： GSM 7-bit 編碼：每段最多 153 字元 UCS-2 編碼：每段最多 67 字元 


; ---------------------------------------------------------------------------
; Prefix / wildcard based response rules
; Section name format: [response_rule:<rule_name>]
; Supported pattern styles in 'match' or 'prefixes':
;   886932*         -> MSISDN prefix match
;   *2222           -> suffix match
;   *93222*         -> substring match
;   imsi:44011*     -> IMSI prefix match (useful for MT-FSM because MAP MT-FSM often carries IMSI, not MSISDN)
; Longest match wins.
; ---------------------------------------------------------------------------

[response_rule:sri_unknownsubscriber_demo]
match = 817085811402
sri_action = error
sri_error = unknownSubscriber

[response_rule:sri_absentsubscriber_demo]
match = 817085811402
sri_action = error
sri_error = absentSubscriberSM

[response_rule:sri_absentsubscriber_prefix_demo]
match = 8170858114*
sri_action = error
sri_error = absentSubscriberSM

[response_rule:sri_success_override_demo]
match = 886936*
sri_action = success
sri_nnn = 886936000001
sri_imsi = 46601*

[response_rule:mtfsm_absent_demo]
match = 817085811402
mt_action = error
mt_error = absentSubscriberSM

[response_rule:mtfsm_busy_demo]
match = 8170858114*
mt_action = error
mt_error = subscriberBusyForMT-SMS

[response_rule:mtfsm_memory_full_by_imsi_demo]
match = imsi:44011*
mt_action = error
mt_error = memoryCapacityExceeded
